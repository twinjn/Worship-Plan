<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Worship Einsatzplan</title>
  <style>
    :root{
      --bg: #fbf9f6; /* warm off-white */
      --text:#222;
      --muted:#6b6b6b;
      --accent:#6b7a6a; /* soft sage */
      --cell:#f3f6f2;
      --person:#e7efe8;
      --line: rgba(0,0,0,0.08);
      --radius:6px;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    .app{max-width:1100px;margin:28px auto;padding:20px}
    header{display:flex;gap:12px;align-items:center;justify-content:space-between}
    h1{font-weight:600;margin:0;font-size:1.2rem;color:var(--accent)}
    .controls{display:flex;gap:8px;align-items:center}
    button{background:transparent;border:1px solid var(--line);padding:8px 10px;border-radius:8px;color:var(--text);cursor:pointer}
    button.strong{background:var(--accent);color:white;border:0}
    .small{padding:6px 8px;font-size:0.9rem}
    .people-bar{margin:18px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .person{background:var(--person);padding:8px 10px;border-radius:10px;border:1px solid var(--line);cursor:grab;user-select:none;display:flex;gap:8px;align-items:center}
    .person.dragging{opacity:0.6;transform:scale(1.02)}
    .person .rm{font-size:0.8rem;color:var(--muted);cursor:pointer}
    .bar-actions{display:flex;gap:8px;align-items:center}

    .table-wrap{overflow:auto;border-radius:8px}
    table{border-collapse:collapse;width:100%;min-width:680px;background:white}
    th,td{padding:12px 10px;text-align:left;border-bottom:1px solid var(--line);border-right:1px solid var(--line);font-size:0.95rem}
    th:last-child,td:last-child{border-right:0}
    th{background:transparent;padding:14px;font-weight:600;color:var(--muted)}
    td.date{width:150px;background:transparent;font-weight:500}
    td.cell{min-width:160px;vertical-align:top}
    .slot{min-height:42px;padding:6px;border-radius:6px;background:var(--cell);display:flex;align-items:center;justify-content:space-between}
    .slot.empty{color:var(--muted);font-style:italic}
    .slot .x{font-weight:700;margin-left:8px;color:var(--muted);cursor:pointer}
    .slot.assigned{background:var(--person);}

    /* small editor UI */
    .edit-mode{border:1px dashed var(--line);padding:8px;border-radius:8px}
    .inline{display:inline-flex;gap:6px;align-items:center}

    /* popup selection */
    .picker{position:fixed;background:white;border:1px solid var(--line);box-shadow:none;border-radius:8px;padding:8px;z-index:40}
    .picker .p{padding:6px 10px;border-radius:6px;cursor:pointer}
    .picker .p:hover{background:var(--cell)}

    /* print friendly */
    @media print{
      body{background:white}
      .no-print{display:none}
      .app{max-width:100%;Padding:0}
      table{min-width:0}
    }

    /* responsive tweaks */
    @media (max-width:720px){
      .app{padding:12px}
      th,td{padding:10px}
      .people-bar{gap:8px}
      table{min-width:600px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Worship Einsatzplan</h1>
      <div class="controls no-print">
        <button id="btnPdf" class="small">PDF</button>
        <button id="btnPrint" class="small">Drucken</button>
        <button id="btnReset" class="small">Zurücksetzen</button>
      </div>
    </header>

    <section class="no-print">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Personen</strong>
        <div class="bar-actions">
          <button id="toggleEdit" class="small">Bearbeiten</button>
          <button id="addPerson" class="small">Person hinzufügen</button>
        </div>
      </div>
      <div id="peopleBar" class="people-bar" aria-label="Personenliste"></div>
    </section>

    <section>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <strong>Plan</strong>
        <div class="no-print">
          <button id="addRole" class="small">Rolle hinzufügen</button>
          <button id="addDate" class="small">Datum hinzufügen</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="planTable" role="grid"></table>
      </div>
    </section>

    <div id="picker" class="picker" style="display:none"></div>

    <footer style="margin-top:18px;color:var(--muted);font-size:0.9rem">Automatisch gespeichert im Browser (localStorage).</footer>
  </div>

  <script>
    // Datenmodell
    const STORAGE_KEY='worshipPlanV1'

    let state = {
      people: [], // {id,name}
      roles: [], // strings
      dates: [], // ISO strings
      assignments: {} // key: dateIdx|roleIdx => personId
    }

    // util
    const $ = sel => document.querySelector(sel)
    const fmtDate = d => new Date(d).toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'2-digit'})
    const uid = (n=6)=> Math.random().toString(36).slice(2,2+n)

    // sample data
    const sample = ()=>{
      state.people = [
        {id:'p1',name:'Anna'},
        {id:'p2',name:'Mark'},
        {id:'p3',name:'Lena'},
        {id:'p4',name:'Paul'}
      ]
      state.roles = ['Leader','Keyboard','Drums']
      state.dates = ['2026-06-07','2026-06-14','2026-06-21','2026-06-28']
      state.assignments = {
        '0|0':'p1','0|1':'p2','1|0':'p3','1|2':'p4','2|1':'p1'
      }
      save()
    }

    function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)) }
    function load(){ const v=localStorage.getItem(STORAGE_KEY); if(v){state=JSON.parse(v)} else sample() }

    // rendering
    function renderPeople(edit=false){
      const bar = $('#peopleBar'); bar.innerHTML=''
      state.people.forEach(p=>{
        const el = document.createElement('div'); el.className='person'; el.draggable=false; el.dataset.id=p.id; el.textContent=p.name
        if(edit){ const rm=document.createElement('span'); rm.className='rm'; rm.textContent='✕'; rm.style.marginLeft='8px'; rm.title='Löschen'; rm.addEventListener('click',e=>{e.stopPropagation(); removePerson(p.id)}) ; el.appendChild(rm)}
        el.addEventListener('pointerdown',startDragPerson)
        el.addEventListener('dblclick',()=>renamePersonPrompt(p.id))
        bar.appendChild(el)
      })
    }

    function renderTable(){
      const table = $('#planTable'); table.innerHTML=''
      const thead = document.createElement('thead'); const hrow = document.createElement('tr')
      hrow.appendChild(document.createElement('th'))
      state.roles.forEach((r,ri)=>{
        const th = document.createElement('th'); th.textContent=r
        if(true){
          const wrap=document.createElement('div'); wrap.style.display='flex';wrap.style.justifyContent='space-between';wrap.style.alignItems='center'
          const name=document.createElement('span'); name.textContent=r
          const btns=document.createElement('span'); btns.className='no-print'
          const rename=document.createElement('button'); rename.textContent='Umbenennen'; rename.className='small'; rename.addEventListener('click',()=>renameRolePrompt(ri))
          const rm=document.createElement('button'); rm.textContent='Löschen'; rm.className='small'; rm.addEventListener('click',()=>removeRole(ri))
          btns.appendChild(rename); btns.appendChild(rm)
          wrap.appendChild(name); wrap.appendChild(btns)
          th.innerHTML=''; th.appendChild(wrap)
        }
        hrow.appendChild(th)
      })
      thead.appendChild(hrow); table.appendChild(thead)

      const tbody = document.createElement('tbody')
      state.dates.forEach((d,di)=>{
        const tr=document.createElement('tr')
        const tdDate=document.createElement('td'); tdDate.className='date'; tdDate.textContent=fmtDate(d)
        const dateBtns=document.createElement('div'); dateBtns.className='no-print';
        const edit=document.createElement('button'); edit.textContent='Bearbeiten'; edit.className='small'; edit.addEventListener('click',()=>renameDatePrompt(di))
        const rm=document.createElement('button'); rm.textContent='Löschen'; rm.className='small'; rm.addEventListener('click',()=>removeDate(di))
        dateBtns.appendChild(edit); dateBtns.appendChild(rm); tdDate.appendChild(dateBtns)
        tr.appendChild(tdDate)

        state.roles.forEach((r,ri)=>{
          const td=document.createElement('td'); td.className='cell'; td.dataset.date=di; td.dataset.role=ri
          const key = di+'|'+ri; const pid = state.assignments[key]
          const slot=document.createElement('div'); slot.className='slot '+(pid? 'assigned':'empty')
          slot.dataset.date=di; slot.dataset.role=ri
          if(pid){ const p = state.people.find(x=>x.id===pid); slot.textContent = p? p.name : '—'; const xbtn=document.createElement('span'); xbtn.className='x no-print'; xbtn.textContent='✕'; xbtn.title='Löschen'; xbtn.addEventListener('click',ev=>{ev.stopPropagation(); delete state.assignments[key]; save(); renderTable();}); slot.appendChild(xbtn)} else { slot.textContent='(leer)'}
          slot.addEventListener('click',()=>openPicker(slot,di,ri))
          // enable drop highlighting
          td.appendChild(slot)
          tbody.appendChild(tr)
          td.addEventListener('pointerover',e=>{})
          tr.appendChild(td)
        })
      })
      table.appendChild(tbody)
    }

    // person management
    function addPerson(){ const name=prompt('Name der Person'); if(name){ state.people.push({id:uid(4),name:name.trim()}); save(); renderPeople(editMode); renderTable() }}
    function removePerson(id){ if(!confirm('Person wirklich löschen?')) return; state.people=state.people.filter(p=>p.id!==id); // remove assignments
      for(const k in {...state.assignments}) if(state.assignments[k]===id) delete state.assignments[k]; save(); renderPeople(editMode); renderTable() }
    function renamePersonPrompt(id){ const p=state.people.find(x=>x.id===id); const name=prompt('Neuer Name',p.name); if(name){ p.name=name.trim(); save(); renderPeople(editMode); renderTable() }}

    // roles
    function addRole(){ const r=prompt('Name der Rolle'); if(r){ state.roles.push(r.trim()); save(); renderTable() }}
    function renameRolePrompt(i){ const val=prompt('Neuer Rollenname',state.roles[i]); if(val){ state.roles[i]=val.trim(); save(); renderTable() }}
    function removeRole(i){ if(!confirm('Rolle wirklich löschen?')) return; state.roles.splice(i,1); // remove assignment entries with role index
      for(const k in {...state.assignments}){ const [di,ri]=k.split('|').map(Number); if(ri===i) delete state.assignments[k]; else if(ri>i){ const v=state.assignments[k]; delete state.assignments[k]; state.assignments[di+'|'+(ri-1)]=v }} save(); renderTable() }

    // dates
    function addDate(){ const d=prompt('Datum (JJJJ-MM-TT)'); if(d){ state.dates.push(d); save(); renderTable() }}
    function renameDatePrompt(i){ const val=prompt('Neues Datum (JJJJ-MM-TT)',state.dates[i]); if(val){ state.dates[i]=val; save(); renderTable() }}
    function removeDate(i){ if(!confirm('Datum wirklich löschen?')) return; state.dates.splice(i,1); // shift assignments
      const next={}
      for(const k in state.assignments){ const [di,ri]=k.split('|').map(Number); if(di===i) continue; const newDi = di>i? di-1: di; next[newDi+'|'+ri]=state.assignments[k] }
      state.assignments = next; save(); renderTable() }

    // picker popup
    const picker = $('#picker')
    function openPicker(slot,dIdx,rIdx){ picker.innerHTML=''; picker.style.display='block'; const rect=slot.getBoundingClientRect(); picker.style.left=(rect.right+8)+'px'; picker.style.top=(rect.top)+'px'
      state.people.forEach(p=>{ const el=document.createElement('div'); el.className='p'; el.textContent=p.name; el.addEventListener('click',()=>{ assign(dIdx,rIdx,p.id); picker.style.display='none' }) ; picker.appendChild(el) })
      const empty=document.createElement('div'); empty.className='p'; empty.textContent='Leer'; empty.style.color='var(--muted)'; empty.addEventListener('click',()=>{ delete state.assignments[dIdx+'|'+rIdx]; save(); renderTable(); picker.style.display='none'}); picker.appendChild(empty)
    }
    document.addEventListener('click',e=>{ if(!picker.contains(e.target)) picker.style.display='none' })

    function assign(di,ri,pid){ const target = di+'|'+ri; // if occupied by other, swap
      const existing = Object.keys(state.assignments).find(k=>state.assignments[k]===pid)
      // if person already placed, remove from old
      if(existing){ state.assignments[existing]=state.assignments[target] || undefined; if(!state.assignments[existing]) delete state.assignments[existing] }
      if(state.assignments[target] && state.assignments[target]!==pid){ // swap
        // find where pid came from
        const from = existing
        state.assignments[target]=pid
      } else {
        state.assignments[target]=pid
      }
      save(); renderTable()
    }

    // Drag & Drop (pointer-based to support touch + mouse)
    let dragState = null
    function startDragPerson(e){
      const el = e.currentTarget; e.preventDefault(); el.setPointerCapture(e.pointerId)
      dragState = {id: el.dataset.id,ghost:createGhost(el),startEvent:e}
      document.addEventListener('pointermove',onDragMove)
      document.addEventListener('pointerup',endDrag)
    }
    function createGhost(el){ const g = el.cloneNode(true); g.style.position='fixed'; g.style.zIndex=9999; g.style.pointerEvents='none'; g.style.transform='translate(-50%,-50%) scale(1.05)'; g.classList.add('dragging'); document.body.appendChild(g); return g }
    function onDragMove(e){ if(!dragState) return; dragState.ghost.style.left = e.clientX+'px'; dragState.ghost.style.top = e.clientY+'px'; // highlight target
      const under = document.elementFromPoint(e.clientX,e.clientY)
      clearHighlights()
      const slot = under && under.closest && under.closest('.slot')
      if(slot) slot.style.outline='2px dashed var(--accent)'
    }
    function clearHighlights(){ document.querySelectorAll('.slot').forEach(s=>s.style.outline='') }
    function endDrag(e){ if(!dragState) return; const id = dragState.id; dragState.ghost.remove(); document.removeEventListener('pointermove',onDragMove); document.removeEventListener('pointerup',endDrag)
      const under = document.elementFromPoint(e.clientX,e.clientY)
      const slot = under && under.closest && under.closest('.slot')
      if(slot){ const di = Number(slot.dataset.date); const ri = Number(slot.dataset.role); const key = di+'|'+ri; const targetPid = state.assignments[key]
        // if occupied by someone else, swap
        if(targetPid && targetPid!==id){ // find existing location of id
          const from = Object.keys(state.assignments).find(k=>state.assignments[k]===id)
          if(from){ state.assignments[from]=targetPid } // put target into from
        }
        state.assignments[key]=id
        // remove old occurrence (if any) except the one we swapped into
        for(const k in {...state.assignments}){ if(state.assignments[k]===id && k!==key) delete state.assignments[k] }
        save(); renderTable()
      }
      clearHighlights(); dragState=null
    }

    // PDF/Print
    function openPrintWindow(asPdf=false){
      // create clean window for printing
      const w = window.open('','_blank')
      const doc = w.document
      const css = `body{font-family:Inter,system-ui,Arial;color:#222}table{border-collapse:collapse;width:100%}th,td{padding:8px;border:1px solid #eee}`
      const title = 'Worship Einsatzplan'
      doc.write('<!doctype html><html><head><meta charset="utf-8"><title>'+title+'</title><style>'+css+'</style></head><body>')
      doc.write('<h2 style="color:#6b7a6a">'+title+'</h2>')
      doc.write('<table>')
      // header
      doc.write('<thead><tr><th>Datum</th>')
      state.roles.forEach(r=>doc.write('<th>'+escapeHtml(r)+'</th>'))
      doc.write('</tr></thead><tbody>')
      state.dates.forEach((d,di)=>{
        doc.write('<tr>')
        doc.write('<td style="font-weight:600">'+fmtDate(d)+'</td>')
        state.roles.forEach((r,ri)=>{
          const key = di+'|'+ri; const pid=state.assignments[key]; const name = pid? (state.people.find(p=>p.id===pid)||{}).name || '': ''
          doc.write('<td style="background:#fbfbfb;padding:8px">'+escapeHtml(name)+'</td>')
        })
        doc.write('</tr>')
      })
      doc.write('</tbody></table>')
      doc.write('</body></html>')
      doc.close()
      // Trigger print; user can choose "Als PDF speichern"
      w.focus()
      setTimeout(()=>{ w.print() },300)
    }
    function escapeHtml(s){ if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

    // reset to sample
    function resetSample(){ if(!confirm('Alle Daten zurücksetzen?')) return; sample(); renderPeople(editMode); renderTable() }

    // init
    let editMode = false
    function init(){
      load(); renderPeople(editMode); renderTable()
      $('#addPerson').addEventListener('click',addPerson)
      $('#toggleEdit').addEventListener('click',()=>{ editMode=!editMode; $('#toggleEdit').textContent=editMode? 'Fertig':'Bearbeiten'; renderPeople(editMode) })
      $('#addRole').addEventListener('click',addRole)
      $('#addDate').addEventListener('click',addDate)
      $('#btnPdf').addEventListener('click',()=>openPrintWindow(true))
      $('#btnPrint').addEventListener('click',()=>window.print())
      $('#btnReset').addEventListener('click',resetSample)
    }

    init()
  </script>
</body>
</html>
