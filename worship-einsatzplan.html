<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worship Einsatzplan – El Bethel Church</title>
  <link rel="stylesheet" href="worship-einsatzplan.css">
</head>
<body>

  <header class="hdr">
    <img src="logo.png" class="hdr-logo" alt="El Bethel Church"
         onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex'">
    <div id="logo-fallback" class="hdr-logo-ph" style="display:none">El Bethel<br>Church</div>
    <div class="hdr-txt">
      <h1>Worship Einsatzplan</h1>
      <p>El Bethel Church</p>
    </div>
  </header>

  <div class="bar">
    <button class="btn" id="btn-edit" onclick="toggleEdit()">
      <svg class="ico" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span class="lbl">Bearbeiten</span>
    </button>
    <div class="sep"></div>
    <button class="btn" onclick="dlgDate()">
      <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg>
      <span class="lbl">Datum</span>
    </button>
    <button class="btn" onclick="dlgRole()">
      <svg class="ico" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="23" y2="17"/><line x1="20" y1="14" x2="26" y2="14"/></svg>
      <span class="lbl">Rolle</span>
    </button>
    <button class="btn" onclick="dlgPerson()">
      <svg class="ico" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
      <span class="lbl">Person</span>
    </button>
    <div class="sep"></div>
    <button class="btn btn-accent" onclick="genPDF()">
      <svg class="ico" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      PDF
    </button>
    <button class="btn" onclick="window.print()">
      <svg class="ico" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      <span class="lbl">Drucken</span>
    </button>
  </div>

  <main class="main">
    <div class="pp" id="pp">
      <div class="pp-hd">
        <h2>Personen</h2>
        <button class="btn btn-sm" onclick="dlgPerson()">+ Hinzufügen</button>
      </div>
      <div class="pp-bd" id="plist"></div>
    </div>

    <div class="tbl-wrap">
      <table id="tbl"></table>
    </div>
  </main>

  <!-- Modal -->
  <div class="mo" id="mo" onclick="if(event.target===this)closeMo()">
    <div class="mo-box">
      <div class="mo-hd">
        <h3 id="mo-ttl"></h3>
        <button class="btn btn-ico" onclick="closeMo()">
          <svg class="ico" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="mo-bd" id="mo-bd"></div>
      <div class="mo-ft" id="mo-ft"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="worship-einsatzplan.js"></script>
</body>
</html>
